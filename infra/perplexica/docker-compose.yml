# Perplexica 80서버 배포용 docker-compose
# 목적: SearXNG(기존 :8888) 백엔드 + LLM provider(Ollama/OpenAI/Claude) 통합한
#       Perplexity 클론 답변 엔진. stock-talk 외 다른 프로젝트도 HTTP API로 호출 가능.
#
# 사전 조건:
#   1. 80서버에 docker + docker compose 설치됨 (사용자 확인 완료)
#   2. SearXNG가 192.168.20.80:8888 에서 동작 중 (기존 운영)
#   3. config.toml 파일이 ./data/config.toml 에 준비됨 (config.toml.example 참고)
#
# 실행:
#   cd /opt/perplexica
#   docker compose up -d
#   curl http://192.168.20.80:3000/api/config        # 헬스체크
#
# 데이터 영속:
#   ./data/   ─ 설정 파일 + 채팅 이력 SQLite + 업로드
#
# 포트:
#   3000 ─ Perplexica 웹 UI + HTTP API (LAN 노출, 외부 차단은 방화벽으로)

version: '3.8'

services:
  perplexica:
    image: itzcrazykns1337/perplexica:main
    container_name: perplexica
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Perplexica 공식 이미지의 config 위치는 컨테이너 내부 WORKDIR /home/perplexica.
      # 부팅 시 config.toml이 없으면 기본값 적용 → SearXNG/LLM provider 미설정 상태.
      # 반드시 data/config.toml 준비 후 기동 (config.toml.example 복사).
      - ./data:/home/perplexica/data
      - ./data/config.toml:/home/perplexica/config.toml:ro
    environment:
      NODE_ENV: production
    # Ollama 호스트 = 192.168.20.30:11434 (확정). config.toml의 [MODELS.OLLAMA] API_URL에서 직접 호출.
    # host.docker.internal extra_hosts 매핑 불필요 — LAN IP 직접 사용.
    networks:
      - perplexica_net

networks:
  perplexica_net:
    driver: bridge
